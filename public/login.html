<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Método Fermento · Acceso</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--terra:#A85636;--terra-d:#7F3A22;--terra-l:rgba(168,86,54,.13);--terra-b:rgba(168,86,54,.28);--ink:#1C1917;--muted:#6B6560;--muted-l:#9C9490;--sand:#F7F4EF;--white:#fff}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--sand);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background-image:radial-gradient(ellipse 60% 50% at 80% 10%,rgba(168,86,54,.08) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 10% 85%,rgba(168,86,54,.05) 0%,transparent 55%)}
.card{width:100%;max-width:420px}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:36px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--terra)}
.logo-text{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-l)}
h1{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;color:var(--white);line-height:1.1;margin-bottom:6px}
h1 em{font-style:italic;color:var(--terra)}
.subtitle{font-size:13px;color:var(--muted-l);margin-bottom:36px;line-height:1.6}
.field{margin-bottom:16px}
label{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-l);margin-bottom:6px;font-weight:500}
input{width:100%;padding:13px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--sand);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--terra-b);background:rgba(255,255,255,.07)}
input::placeholder{color:var(--muted)}
.btn{width:100%;padding:15px;background:var(--terra);color:var(--white);border:none;border-radius:10px;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--terra-d)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn.loading .spinner{display:block}
.btn.loading .btn-text{display:none}
.error{background:rgba(180,50,50,.12);border:1px solid rgba(220,80,80,.25);border-radius:8px;padding:12px 14px;font-size:13px;color:#f0a0a0;margin-top:12px;display:none}
.error.show{display:block}
.foot{margin-top:28px;font-size:11px;color:var(--muted);text-align:center;line-height:1.7}
.foot a{color:var(--terra);text-decoration:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-dot"></div><div class="logo-text">Método Fermento</div></div>
  <h1>Acceso a la<br><em>plataforma educativa.</em></h1>
  <p class="subtitle">Ingresá con tu email y contraseña para acceder a tus cursos.</p>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="btnLogin" onclick="doLogin()">
    <div class="spinner"></div>
    <span class="btn-text">Ingresar →</span>
  </button>
  <div class="error" id="errorMsg"></div>
  <div class="foot">
    ¿No tenés acceso? <a href="mailto:info@metodofermento.com.ar">Contactanos</a><br>
    <a href="/" style="color:var(--muted-l)">← Volver al sitio</a>
  </div>
</div>
<script>
// If already logged in, redirect
const stored = localStorage.getItem('mf_token');
if (stored) {
  fetch('/api/auth?action=verify', { headers: { 'Authorization': 'Bearer ' + stored } })
    .then(r => r.json())
    .then(d => { if (d.user) window.location.href = '/cursos'; })
    .catch(() => {});
}

document.getElementById('email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('password').focus(); });
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errorMsg');

  if (!email || !password) { showError('Completá email y contraseña.'); return; }

  btn.classList.add('loading');
  btn.disabled = true;
  err.classList.remove('show');

  try {
    const res = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) { showError(data.error || 'Error al ingresar.'); return; }

    localStorage.setItem('mf_token', data.token);
    localStorage.setItem('mf_user', JSON.stringify(data.user));

    // Redirect to cursos or the page they were trying to access
    const next = new URLSearchParams(location.search).get('next') || '/cursos';
    window.location.href = next;

  } catch(e) {
    showError('Error de conexión. Intentá de nuevo.');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg;
  err.classList.add('show');
}
</script>
</body>
</html>
