<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias! – Método Fermento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1A1A2E;
      color: #f5f0e8;
      font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
      padding: 2rem;
      text-align: center;
    }

    .card {
      max-width: 460px;
      width: 100%;
    }

    .icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 1.5rem;
      animation: pop .5s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes pop {
      from { transform: scale(.4); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 400;
      margin-bottom: 1rem;
      line-height: 1.25;
    }

    p {
      font-size: .98rem;
      line-height: 1.75;
      color: rgba(245,240,232,.65);
      margin-bottom: 1rem;
    }

    .highlight {
      background: rgba(168,86,54,.15);
      border: 1px solid rgba(168,86,54,.3);
      border-radius: 8px;
      padding: 1rem 1.2rem;
      font-size: .9rem;
      color: rgba(245,240,232,.8);
      margin: 1.5rem 0 2rem;
      line-height: 1.65;
    }

    .highlight strong { color: #A85636; }

    .btn-back {
      display: inline-block;
      color: rgba(245,240,232,.45);
      font-size: .88rem;
      text-decoration: none;
      border-bottom: 1px solid rgba(245,240,232,.2);
      padding-bottom: 1px;
      transition: color .2s, border-color .2s;
    }

    .btn-back:hover {
      color: rgba(245,240,232,.8);
      border-color: rgba(245,240,232,.5);
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      font-size: .75rem;
      color: rgba(245,240,232,.2);
    }
  </style>
</head>
<body>

  <div class="card">
    <span class="icon">🌾</span>
    <h1>¡Pago confirmado!</h1>
    <p>
      Tu compra fue procesada con éxito.
    </p>
    <div class="highlight">
      En los próximos minutos vas a recibir un email con el<br>
      <strong>link de descarga de tu guía</strong>.<br>
      Revisá también la carpeta de spam por las dudas.
    </div>
    <a href="/guia" class="btn-back">← Volver a la guía</a>
  </div>

  <footer>Método Fermento · metodofermento.com.ar</footer>

</body>
</html>
