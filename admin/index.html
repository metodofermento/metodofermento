<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin · Método Fermento</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,300&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --terra:#A85636;--terra-d:#7F3A22;--terra-l:rgba(168,86,54,.12);--terra-b:rgba(168,86,54,.22);
  --navy:#1A1A2E;--ink:#1C1917;--muted:#6B6560;--line:#E2DDD6;
  --sand:#F7F4EF;--sand-d:#EDE8E0;--white:#fff;
  --nuevo:#2563EB;--nuevo-l:rgba(37,99,235,.1);
  --contactado:#D97706;--contactado-l:rgba(217,119,6,.1);
  --cerrado:#16A34A;--cerrado-l:rgba(22,163,74,.1);
  --descartado:#6B6560;--descartado-l:rgba(107,101,96,.1);
  --serif:'Fraunces',Georgia,serif;--sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --r:8px;--r-md:12px;--r-lg:16px;
  --sh:0 2px 12px rgba(0,0,0,.06);--sh-l:0 8px 32px rgba(0,0,0,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--sand);min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font:inherit}
input,select,textarea{font:inherit}

/* ── LOGIN ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:var(--navy);
}
.login-box{
  background:var(--white);border-radius:20px;padding:44px 40px;
  width:100%;max-width:400px;box-shadow:var(--sh-l);
}
.login-logo{
  font-family:var(--serif);font-size:1.4rem;font-weight:700;
  font-optical-sizing:auto;color:var(--navy);
  display:flex;align-items:center;gap:9px;margin-bottom:28px;
}
.login-logo-dot{width:8px;height:8px;background:var(--terra);border-radius:50%}
.login-box h2{font-family:var(--sans);font-size:16px;font-weight:600;margin-bottom:20px;color:var(--muted)}
.login-label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.login-input{
  width:100%;padding:11px 14px;border:1.5px solid var(--line);
  border-radius:var(--r-md);font-size:15px;color:var(--ink);background:var(--white);
  outline:none;transition:border-color .18s,box-shadow .18s;
}
.login-input:focus{border-color:var(--terra);box-shadow:0 0 0 3px var(--terra-l)}
.login-btn{
  width:100%;padding:13px;background:var(--terra);color:#fff;
  border-radius:999px;font-size:13px;font-weight:600;letter-spacing:.04em;
  text-transform:uppercase;margin-top:20px;transition:background .2s;
}
.login-btn:hover{background:var(--terra-d)}
.login-error{color:#dc2626;font-size:13px;margin-top:12px;text-align:center;min-height:18px}

/* ── APP SHELL ── */
#app{display:none}
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--navy);padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;height:56px;
}
.topbar-logo{
  font-family:var(--serif);font-size:1.1rem;font-weight:700;
  font-optical-sizing:auto;color:#fff;
  display:flex;align-items:center;gap:8px;
}
.topbar-logo-dot{width:6px;height:6px;background:var(--terra);border-radius:50%}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-user{font-size:12px;color:rgba(255,255,255,.45)}
.btn-logout{
  font-size:12px;color:rgba(255,255,255,.5);padding:5px 12px;
  border:1px solid rgba(255,255,255,.15);border-radius:999px;transition:all .15s;
}
.btn-logout:hover{color:#fff;border-color:rgba(255,255,255,.35)}

/* ── STATS BAR ── */
.stats-bar{
  background:var(--white);border-bottom:1px solid var(--line);
  padding:0 24px;display:flex;gap:0;overflow-x:auto;
}
.stat-item{
  padding:16px 24px;text-align:center;border-right:1px solid var(--line);
  cursor:pointer;transition:background .15s;white-space:nowrap;flex-shrink:0;
}
.stat-item:hover{background:var(--sand)}
.stat-item.active{background:var(--sand);border-bottom:2px solid var(--terra)}
.stat-n{font-family:var(--serif);font-size:1.6rem;font-weight:700;font-optical-sizing:auto;color:var(--terra);line-height:1}
.stat-l{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:4px}

/* ── TOOLBAR ── */
.toolbar{
  padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  background:var(--white);border-bottom:1px solid var(--line);
}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.search-input{
  width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--line);
  border-radius:999px;font-size:13.5px;outline:none;transition:border-color .18s;
  background:var(--sand);
}
.search-input:focus{border-color:var(--terra);background:var(--white)}
.filter-select{
  padding:9px 14px;border:1.5px solid var(--line);border-radius:999px;
  font-size:13px;color:var(--ink);background:var(--sand);outline:none;cursor:pointer;
}
.filter-select:focus{border-color:var(--terra)}
.btn-export{
  padding:9px 18px;background:var(--sand);border:1.5px solid var(--line);
  border-radius:999px;font-size:12.5px;font-weight:500;color:var(--muted);
  display:flex;align-items:center;gap:6px;transition:all .15s;
}
.btn-export:hover{background:var(--sand-d);color:var(--ink)}
.toolbar-right{margin-left:auto}

/* ── LEADS GRID ── */
.leads-wrap{padding:20px 24px;max-width:1400px;margin:0 auto}
.leads-header{
  display:grid;
  grid-template-columns:2fr 2fr 1fr 1fr 1.5fr 1fr;
  gap:12px;padding:8px 16px;
  font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  margin-bottom:6px;
}
.lead-card{
  background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:0;margin-bottom:8px;overflow:hidden;
  transition:box-shadow .18s,border-color .18s;
}
.lead-card:hover{box-shadow:var(--sh);border-color:var(--sand-d)}
.lead-card.expanded{border-color:var(--terra-b);box-shadow:var(--sh-l)}
.lead-row{
  display:grid;
  grid-template-columns:2fr 2fr 1fr 1fr 1.5fr 1fr;
  gap:12px;padding:14px 16px;align-items:center;cursor:pointer;
}
.lead-nombre{font-weight:500;color:var(--ink);font-size:14px}
.lead-email{color:var(--muted);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lead-fecha{font-size:12px;color:var(--muted)}
.lead-mods{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{
  display:inline-flex;align-items:center;padding:3px 10px;
  border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.04em;
  text-transform:uppercase;white-space:nowrap;
}
.badge-nuevo      {background:var(--nuevo-l);color:var(--nuevo)}
.badge-contactado {background:var(--contactado-l);color:var(--contactado)}
.badge-cerrado    {background:var(--cerrado-l);color:var(--cerrado)}
.badge-descartado {background:var(--descartado-l);color:var(--descartado)}

/* ── LEAD DETAIL (expanded) ── */
.lead-detail{
  border-top:1px solid var(--line);padding:20px 20px 16px;
  display:none;background:var(--sand);
}
.lead-card.expanded .lead-detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.detail-section h5{
  font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;
}
.mod-item{
  background:var(--white);border:1px solid var(--line);border-radius:var(--r);
  padding:12px 14px;margin-bottom:8px;
}
.mod-item-title{font-weight:600;font-size:13px;color:var(--ink);margin-bottom:6px}
.mod-item-checks{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.mod-tag{
  padding:2px 9px;background:var(--sand);border:1px solid var(--line);
  border-radius:999px;font-size:11.5px;color:var(--muted);
}
.mod-nota{font-size:12.5px;color:var(--muted);font-style:italic;margin-top:6px}
.detail-actions{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  padding-top:14px;border-top:1px solid var(--line);
}
.detail-actions label{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.estado-select{
  padding:8px 14px;border:1.5px solid var(--line);border-radius:999px;
  font-size:13px;color:var(--ink);background:var(--white);outline:none;cursor:pointer;
  transition:border-color .18s;
}
.estado-select:focus{border-color:var(--terra)}
.notas-input{
  flex:1;min-width:180px;padding:8px 14px;border:1.5px solid var(--line);
  border-radius:var(--r-md);font-size:13px;color:var(--ink);background:var(--white);
  outline:none;transition:border-color .18s;
}
.notas-input:focus{border-color:var(--terra)}
.btn-save{
  padding:9px 20px;background:var(--terra);color:#fff;border-radius:999px;
  font-size:12.5px;font-weight:600;transition:background .18s;
}
.btn-save:hover{background:var(--terra-d)}
.btn-delete{
  padding:9px 14px;background:transparent;color:#dc2626;border:1.5px solid #fca5a5;
  border-radius:999px;font-size:12.5px;transition:all .18s;margin-left:auto;
}
.btn-delete:hover{background:#fef2f2;border-color:#f87171}

/* ── CHARTS PANEL ── */
#charts-panel{display:none;padding:24px;max-width:1400px;margin:0 auto}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.chart-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);padding:24px}
.chart-card h3{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:13px;color:var(--ink);min-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:10px;background:var(--sand);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:var(--terra);border-radius:999px;transition:width .6s cubic-bezier(.16,1,.3,1)}
.bar-count{font-size:12px;font-weight:600;color:var(--terra);min-width:24px;text-align:right}
.pie-legend{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── TABS ── */
.view-tabs{display:flex;gap:4px;background:var(--sand);padding:12px 24px;border-bottom:1px solid var(--line)}
.view-tab{
  padding:7px 18px;border-radius:999px;font-size:12.5px;font-weight:500;
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.view-tab.active{background:var(--white);color:var(--ink);box-shadow:var(--sh)}

/* ── EMPTY / LOADING ── */
.empty-state{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-state .emoji{font-size:40px;display:block;margin-bottom:12px}
.empty-state p{font-size:15px}
.loading-dots{display:flex;gap:6px;justify-content:center;padding:40px}
.loading-dots span{width:8px;height:8px;background:var(--terra);border-radius:50%;animation:bounce .8s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:var(--navy);color:#fff;padding:12px 20px;
  border-radius:12px;font-size:13.5px;font-weight:500;
  box-shadow:var(--sh-l);transform:translateY(80px);opacity:0;
  transition:all .3s cubic-bezier(.16,1,.3,1);pointer-events:none;
}
#toast.show{transform:translateY(0);opacity:1}
#toast.success::before{content:'✓  '}
#toast.error::before{content:'✕  ';color:#f87171}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .leads-header{display:none}
  .lead-row{grid-template-columns:1fr auto;gap:8px}
  .lead-email,.lead-fecha,.lead-mods{display:none}
  .detail-grid{grid-template-columns:1fr}
  .charts-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .stats-bar{gap:0}
  .stat-item{padding:12px 16px}
  .toolbar{padding:12px 16px}
  .leads-wrap{padding:12px 16px}
  #charts-panel{padding:12px 16px}
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><span class="login-logo-dot"></span>Método Fermento</div>
    <h2>Panel de administración</h2>
    <label class="login-label" for="pwd-input">Contraseña</label>
    <input class="login-input" type="password" id="pwd-input" placeholder="••••••••"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Ingresar →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo"><span class="topbar-logo-dot"></span>Método Fermento · Admin</div>
    <div class="topbar-right">
      <span class="topbar-user">Panel de leads</span>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-item active" onclick="setFiltro('todos',this)">
      <div class="stat-n" id="st-total">—</div>
      <div class="stat-l">Total</div>
    </div>
    <div class="stat-item" onclick="setFiltro('nuevo',this)">
      <div class="stat-n" id="st-nuevo" style="color:var(--nuevo)">—</div>
      <div class="stat-l">Nuevos</div>
    </div>
    <div class="stat-item" onclick="setFiltro('contactado',this)">
      <div class="stat-n" id="st-contactado" style="color:var(--contactado)">—</div>
      <div class="stat-l">Contactados</div>
    </div>
    <div class="stat-item" onclick="setFiltro('cerrado',this)">
      <div class="stat-n" id="st-cerrado" style="color:var(--cerrado)">—</div>
      <div class="stat-l">Cerrados</div>
    </div>
    <div class="stat-item" onclick="setFiltro('descartado',this)">
      <div class="stat-n" id="st-descartado" style="color:var(--descartado)">—</div>
      <div class="stat-l">Descartados</div>
    </div>
  </div>

  <!-- View tabs -->
  <div class="view-tabs">
    <div class="view-tab active" onclick="setView('leads',this)">Lista de leads</div>
    <div class="view-tab" onclick="setView('charts',this)">Estadísticas</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" type="search" placeholder="Buscar por nombre o email…"
             oninput="debounceSearch(this.value)">
    </div>
    <select class="filter-select" id="estado-filter" onchange="cargarLeads(1)">
      <option value="todos">Todos los estados</option>
      <option value="nuevo">Nuevo</option>
      <option value="contactado">Contactado</option>
      <option value="cerrado">Cerrado</option>
      <option value="descartado">Descartado</option>
    </select>
    <button class="btn-export" onclick="exportCSV()">⬇ Exportar CSV</button>
    <div class="toolbar-right">
      <button class="btn-export" onclick="cargarLeads(state.page)">↻ Actualizar</button>
    </div>
  </div>

  <!-- Leads view -->
  <div id="leads-view">
    <div class="leads-wrap">
      <div class="leads-header">
        <span>Nombre</span><span>Email</span><span>Tel</span><span>Fecha</span><span>Módulos</span><span>Estado</span>
      </div>
      <div id="leads-list">
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>
      <div id="pagination" style="display:flex;gap:8px;justify-content:center;margin-top:20px;flex-wrap:wrap"></div>
    </div>
  </div>

  <!-- Charts view -->
  <div id="charts-panel">
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Módulos más solicitados</h3>
        <div id="chart-mods"></div>
      </div>
      <div class="chart-card">
        <h3>Estado del pipeline</h3>
        <canvas id="chart-estados" width="260" height="260" style="display:block;margin:0 auto"></canvas>
        <div class="pie-legend" id="pie-legend"></div>
      </div>
      <div class="chart-card" style="grid-column:1/-1">
        <h3>Leads por mes</h3>
        <div id="chart-meses"></div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<div id="toast"></div>

<script>
const API = '/api/admin-leads';
const state = { secret:'', filtro:'todos', busqueda:'', page:1, totalPages:1, stats:null };

/* ── LOGIN ── */
async function doLogin() {
  const pwd = document.getElementById('pwd-input').value.trim();
  if (!pwd) return;
  document.getElementById('login-error').textContent = '';

  // Verificamos haciendo una llamada real a la API
  try {
    const res = await fetch(`${API}?secret=${encodeURIComponent(pwd)}&stats=1`);
    if (res.status === 401) { document.getElementById('login-error').textContent = 'Contraseña incorrecta.'; return; }
    if (!res.ok) throw new Error('Error de servidor');
    state.secret = pwd;
    sessionStorage.setItem('mf_admin_secret', pwd);
    iniciarApp();
  } catch(e) {
    document.getElementById('login-error').textContent = 'No se pudo conectar. Verificá la URL de la API.';
  }
}

function logout() {
  sessionStorage.removeItem('mf_admin_secret');
  state.secret = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
}

async function iniciarApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await Promise.all([ cargarStats(), cargarLeads(1) ]);
}

/* ── AUTO-LOGIN desde sessionStorage ── */
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('mf_admin_secret');
  if (saved) { document.getElementById('pwd-input').value = saved; state.secret = saved; iniciarApp(); }
});

/* ── STATS ── */
async function cargarStats() {
  const res = await fetch(`${API}?secret=${encodeURIComponent(state.secret)}&stats=1`);
  if (!res.ok) return;
  const data = await res.json();
  state.stats = data;

  document.getElementById('st-total').textContent      = data.total || 0;
  document.getElementById('st-nuevo').textContent      = data.byEstado?.nuevo || 0;
  document.getElementById('st-contactado').textContent = data.byEstado?.contactado || 0;
  document.getElementById('st-cerrado').textContent    = data.byEstado?.cerrado || 0;
  document.getElementById('st-descartado').textContent = data.byEstado?.descartado || 0;

  renderCharts(data);
}

/* ── LEADS ── */
async function cargarLeads(page = 1) {
  state.page = page;
  const el = document.getElementById('leads-list');
  el.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  const params = new URLSearchParams({
    secret: state.secret,
    page,
    limit: 20,
    ...(state.filtro !== 'todos' ? { estado: state.filtro } : {}),
    ...(state.busqueda ? { q: state.busqueda } : {}),
  });

  const res = await fetch(`${API}?${params}`);
  if (!res.ok) { el.innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>Error al cargar leads.</p></div>'; return; }

  const { leads, total, limit } = await res.json();
  state.totalPages = Math.ceil(total / limit);

  if (!leads?.length) {
    el.innerHTML = '<div class="empty-state"><span class="emoji">📭</span><p>No hay leads en este estado.</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  el.innerHTML = leads.map(l => renderLeadCard(l)).join('');
  renderPagination(total, limit);
}

function renderLeadCard(l) {
  const fecha   = l.created_at ? new Date(l.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '—';
  const mods    = (l.modulos_seleccionados || []).join(', ') || '—';
  const badge   = `<span class="badge badge-${l.estado}">${l.estado}</span>`;
  const detalle = renderDetalle(l);

  return `
  <div class="lead-card" id="card-${l.id}" onclick="toggleCard(${l.id}, this)">
    <div class="lead-row">
      <span class="lead-nombre">${esc(l.nombre)}</span>
      <span class="lead-email">${esc(l.email)}</span>
      <span class="lead-fecha">${esc(l.tel||'—')}</span>
      <span class="lead-fecha">${fecha}</span>
      <span class="lead-mods" title="${esc(mods)}">${esc(mods)}</span>
      <span>${badge}</span>
    </div>
    <div class="lead-detail" onclick="event.stopPropagation()">
      ${detalle}
    </div>
  </div>`;
}

function renderDetalle(l) {
  const detalles = l.detalles_modulos || {};
  const modsHtml = Object.entries(detalles).map(([title, data]) => `
    <div class="mod-item">
      <div class="mod-item-title">${esc(title)}</div>
      <div class="mod-item-checks">
        ${(data.items||[]).map(i => `<span class="mod-tag">${esc(i)}</span>`).join('')}
      </div>
      ${data.nota ? `<div class="mod-nota">"${esc(data.nota)}"</div>` : ''}
    </div>
  `).join('') || '<p style="color:var(--muted);font-size:13px">No seleccionó módulos específicos.</p>';

  return `
  <div class="detail-grid">
    <div class="detail-section">
      <h5>Datos de contacto</h5>
      <div style="background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:14px;font-size:13.5px;line-height:2">
        <div><strong>Email:</strong> <a href="mailto:${esc(l.email)}" style="color:var(--terra)">${esc(l.email)}</a></div>
        ${l.tel ? `<div><strong>Tel:</strong> <a href="tel:${esc(l.tel)}">${esc(l.tel)}</a> · <a href="https://wa.me/${l.tel.replace(/\D/g,'')}" target="_blank" style="color:#25D366">WhatsApp →</a></div>` : ''}
        <div><strong>Ingresó:</strong> ${new Date(l.created_at).toLocaleString('es-AR')}</div>
        <div><strong>Fuente:</strong> ${esc(l.fuente||'—')}</div>
        ${l.notas ? `<div style="margin-top:8px;padding:8px 10px;background:var(--sand);border-radius:var(--r);font-style:italic;color:var(--muted)">📝 ${esc(l.notas)}</div>` : ''}
      </div>
    </div>
    <div class="detail-section">
      <h5>Módulos seleccionados</h5>
      ${modsHtml}
    </div>
  </div>
  <div class="detail-actions">
    <label>Estado:</label>
    <select class="estado-select" id="estado-${l.id}" onchange="cambiarBadge(${l.id},this.value)">
      <option value="nuevo"       ${l.estado==='nuevo'       ?'selected':''}>🔵 Nuevo</option>
      <option value="contactado"  ${l.estado==='contactado'  ?'selected':''}>🟡 Contactado</option>
      <option value="cerrado"     ${l.estado==='cerrado'     ?'selected':''}>🟢 Cerrado</option>
      <option value="descartado"  ${l.estado==='descartado'  ?'selected':''}>⚫ Descartado</option>
    </select>
    <input class="notas-input" id="notas-${l.id}" type="text" placeholder="Agregar nota interna…" value="${esc(l.notas||'')}" onclick="event.stopPropagation()">
    <button class="btn-save" onclick="event.stopPropagation();guardarLead(${l.id})">Guardar</button>
    <button class="btn-delete" onclick="event.stopPropagation();eliminarLead(${l.id})">Eliminar</button>
  </div>`;
}

function cambiarBadge(id, estado) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const badge = card.querySelector('.badge');
  if (badge) { badge.className = 'badge badge-' + estado; badge.textContent = estado; }
}

function toggleCard(id, el) {
  const card = el.closest ? el : document.getElementById('card-' + id);
  const isOpen = card.classList.contains('expanded');
  // cerrar todos
  document.querySelectorAll('.lead-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!isOpen) card.classList.add('expanded');
}

async function guardarLead(id) {
  const estado = document.getElementById('estado-' + id)?.value;
  const notas  = document.getElementById('notas-'  + id)?.value.trim();
  const res = await fetch(`${API}?secret=${encodeURIComponent(state.secret)}`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ id, estado, notas }),
  });
  if (res.ok) {
    toast('Guardado ✓', 'success');
    cambiarBadge(id, estado);
    cargarStats();
  } else {
    toast('Error al guardar', 'error');
  }
}

async function eliminarLead(id) {
  if (!confirm('¿Eliminar este lead? Esta acción no se puede deshacer.')) return;
  const res = await fetch(`${API}?secret=${encodeURIComponent(state.secret)}`, {
    method:'DELETE', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ id }),
  });
  if (res.ok) {
    document.getElementById('card-' + id)?.remove();
    toast('Lead eliminado', 'success');
    cargarStats();
  } else {
    toast('Error al eliminar', 'error');
  }
}

function renderPagination(total, limit) {
  const pages = Math.ceil(total / limit);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= pages; i++) {
    html += `<button onclick="cargarLeads(${i})" style="padding:6px 14px;border-radius:999px;border:1.5px solid ${i===state.page?'var(--terra)':'var(--line)'};background:${i===state.page?'var(--terra)':'var(--white)'};color:${i===state.page?'#fff':'var(--muted)'};font-size:13px;cursor:pointer">${i}</button>`;
  }
  el.innerHTML = html;
}

/* ── FILTROS ── */
function setFiltro(val, el) {
  state.filtro = val;
  document.querySelectorAll('.stat-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('estado-filter').value = val;
  cargarLeads(1);
}

let searchTimer;
function debounceSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.busqueda = val; cargarLeads(1); }, 380);
}

/* ── VIEWS ── */
function setView(view, el) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('leads-view').style.display    = view === 'leads'  ? 'block' : 'none';
  document.getElementById('charts-panel').style.display  = view === 'charts' ? 'block' : 'none';
  if (view === 'charts' && state.stats) renderCharts(state.stats);
}

/* ── EXPORT ── */
function exportCSV() {
  const params = new URLSearchParams({ secret: state.secret, export:'csv' });
  window.open(`${API}?${params}`, '_blank');
}

/* ── CHARTS ── */
function renderCharts(data) {
  // Módulos más pedidos
  const modsEl = document.getElementById('chart-mods');
  if (!modsEl) return;
  const mods = Object.entries(data.byMod || {}).sort((a,b) => b[1]-a[1]).slice(0,8);
  const maxMod = mods[0]?.[1] || 1;
  modsEl.innerHTML = mods.length
    ? mods.map(([name, n]) => `
      <div class="bar-row">
        <span class="bar-label" title="${esc(name)}">${esc(name)}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxMod*100)}%"></div></div>
        <span class="bar-count">${n}</span>
      </div>`).join('')
    : '<p style="color:var(--muted);font-size:13px">Sin datos todavía.</p>';

  // Pie de estados
  const canvas = document.getElementById('chart-estados');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const estadoData = [
    { label:'Nuevos',      val: data.byEstado?.nuevo||0,       color:'#2563EB' },
    { label:'Contactados', val: data.byEstado?.contactado||0,  color:'#D97706' },
    { label:'Cerrados',    val: data.byEstado?.cerrado||0,     color:'#16A34A' },
    { label:'Descartados', val: data.byEstado?.descartado||0,  color:'#9CA3AF' },
  ].filter(d => d.val > 0);
  const total = estadoData.reduce((s,d)=>s+d.val,0);

  ctx.clearRect(0,0,260,260);
  if (total === 0) {
    ctx.fillStyle = '#e2ddd6'; ctx.beginPath(); ctx.arc(130,130,100,0,Math.PI*2); ctx.fill();
  } else {
    let angle = -Math.PI / 2;
    estadoData.forEach(d => {
      const slice = (d.val / total) * Math.PI * 2;
      ctx.beginPath(); ctx.moveTo(130,130);
      ctx.arc(130,130,110,angle,angle+slice);
      ctx.closePath(); ctx.fillStyle = d.color; ctx.fill();
      angle += slice;
    });
    // donut hole
    ctx.beginPath(); ctx.arc(130,130,55,0,Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.fillStyle = '#1c1917'; ctx.font = 'bold 28px Plus Jakarta Sans';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(total, 130, 125);
    ctx.font = '12px Plus Jakarta Sans'; ctx.fillStyle = '#9c9490';
    ctx.fillText('leads', 130, 148);
  }

  document.getElementById('pie-legend').innerHTML = estadoData.map(d => `
    <div class="legend-item">
      <span class="legend-dot" style="background:${d.color}"></span>
      <span>${d.label}: <strong>${d.val}</strong></span>
    </div>`).join('');

  // Meses
  const mesesEl = document.getElementById('chart-meses');
  if (!mesesEl) return;
  const meses = Object.entries(data.byMonth || {}).sort(([a],[b]) => a.localeCompare(b)).slice(-12);
  const maxMes = Math.max(...meses.map(([,n])=>n), 1);
  mesesEl.innerHTML = meses.length
    ? `<div style="display:flex;align-items:flex-end;gap:8px;height:120px;padding-bottom:8px">
        ${meses.map(([mes, n]) => {
          const h = Math.round(n/maxMes*100);
          const label = mes.slice(5) + '/' + mes.slice(2,4);
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <span style="font-size:11px;font-weight:600;color:var(--terra)">${n}</span>
            <div style="width:100%;background:var(--terra);border-radius:4px 4px 0 0;height:${h}%"></div>
            <span style="font-size:10px;color:var(--muted)">${label}</span>
          </div>`;
        }).join('')}
      </div>`
    : '<p style="color:var(--muted);font-size:13px">Sin datos todavía.</p>';
}

/* ── UTILS ── */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3000);
}
</script>
</body>
</html>
